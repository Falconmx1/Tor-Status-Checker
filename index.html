<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tor Status Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔒 Tor Status Checker</h1>
        <div class="status-card">
            <h2>Estado de Tor</h2>
            <div id="torStatus" class="status">Verificando...</div>
        </div>
        <div class="ip-card">
            <h2>Tu IP Pública</h2>
            <div id="ipAddress" class="ip">-</div>
            <button id="checkBtn" class="btn">Verificar IP</button>
        </div>
        <div class="info">
            <p>🌐 Si ves una IP que no es la tuya real, ¡estás usando Tor!</p>
            <p>⚡ Esta herramienta verifica tu IP a través de check.torproject.org</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
